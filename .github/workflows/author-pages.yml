name: Author pages (push CMS content)

# MANUAL only. Runs cms/scripts/push-pages.mjs to (re)author pages from their
# block definitions in code. This OVERWRITES those pages' layouts in the CMS —
# use it for deliberate structural authoring, not routine deploys, so client
# content tweaks in /admin aren't clobbered.
on:
  workflow_dispatch: {}

jobs:
  author:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Push pages to the live CMS
        working-directory: cms
        env:
          CMS_URL: ${{ vars.CMS_URL || 'https://cms.guillensolutions.com' }}
          ADMIN_EMAIL: ${{ secrets.CMS_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.CMS_ADMIN_PASSWORD }}
        run: node scripts/push-pages.mjs
