# ═══════════════════════════════════════════════════════════════════════════
#  guillensolutions.com — Payload CMS stack (RAYA)
#
#  Two containers on RAYA's docker network:
#    • guillensolutions-cms     → Payload/Next (built from ./Dockerfile), :3000
#    • guillensolutions-cms-db  → Postgres 16, INTERNAL network only (never exposed)
#
#  Nginx Proxy Manager routes cms.guillensolutions.com → guillensolutions-cms:3000
#  by container name on the shared `proxy` network (no ports published to the host).
#
#  State lives in bind-mounts under /srv/docker/guillensolutions-cms so the backup
#  kit (ops/raya) can snapshot it. git = code; Postgres = content.
#
#  Deploy:  git pull && cd cms && cp .env.example .env && <edit .env> \
#           && docker compose up -d --build
# ═══════════════════════════════════════════════════════════════════════════
services:
  guillensolutions-cms:
    container_name: guillensolutions-cms
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # In-container hostname of the DB service (never leaves the internal net).
      DATABASE_URL: postgres://payload:${DB_PASSWORD}@guillensolutions-cms-db:5432/payload
    volumes:
      # Uploaded media persists outside the container (see Media.staticDir = ../media).
      - /srv/docker/guillensolutions-cms/media:/app/media
    depends_on:
      - guillensolutions-cms-db
    networks:
      - proxy      # reachable by Nginx Proxy Manager by container name
      - internal   # reaches the DB

  guillensolutions-cms-db:
    container_name: guillensolutions-cms-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: payload
    volumes:
      - /srv/docker/guillensolutions-cms/pgdata:/var/lib/postgresql/data
    networks:
      - internal   # NOT on proxy — no host ports, never internet-reachable

networks:
  proxy:
    external: true   # created by Nginx Proxy Manager; shared across RAYA sites
  internal:
    driver: bridge
